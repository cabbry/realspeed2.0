name: Build and Upload to TestFlight

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:  # Permet de lancer manuellement depuis l'UI GitHub

jobs:
  build:
    runs-on: macos-15  # macOS Sequoia avec Xcode 26 disponible
    timeout-minutes: 60

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PROJECT_PATH: RealSpeed2/RealSpeed2.csproj
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net10.0-ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: |
          # Liste les Xcode dispo
          ls /Applications/ | grep -i Xcode || true
          # Sélectionne le dernier Xcode 26.x.y présent sur le runner
          XCODE_PATH=$(ls -d /Applications/Xcode_26.*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26 found on runner"
            exit 1
          fi
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcrun --find actool

      - name: Inspect preinstalled .NET and workloads
        run: |
          echo "== Available dotnet SDKs =="
          dotnet --list-sdks
          echo "== Currently installed workloads =="
          dotnet workload list || true
          echo "== Dotnet version selected =="
          dotnet --version

      - name: Install MAUI workload pinned for Xcode 26.3
        run: |
          # The latest MAUI workload (iOS 26.5) requires Xcode 26.5, but the macos-15 runner
          # ships at most Xcode 26.3. We pin to the matching workload set version.
          # Look up available workload sets and pick the highest that supports Xcode 26.3.
          echo "== Searching available workload-set versions =="
          dotnet workload search-version --take 30 2>&1 | head -40 || true

          # Try to install workload set matching Xcode 26.3
          # If the explicit version fails, fall back to latest
          dotnet workload install maui --version 10.0.100 2>&1 || dotnet workload install maui
          dotnet workload list

      - name: Import Apple Distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Crée un keychain temporaire dédié au CI
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Décode le .p12 depuis le secret base64
          echo "$CERT_P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12

          # Importe le certificat + clé privée dans le keychain
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Autorise codesign à utiliser la clé sans prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Active le keychain pour la session
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN_PATH"

          # Vérifie
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/profile.mobileprovision

          # Extrait l'UUID pour nommer le fichier
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision)")
          echo "Profile UUID: $UUID"

          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build & archive IPA (Release)
        run: |
          dotnet publish $PROJECT_PATH \
            -f $TARGET_FRAMEWORK \
            -c $CONFIGURATION \
            /p:ArchiveOnBuild=true \
            /p:BuildIpa=true

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find . -name "*.ipa" -path "*/publish/*" | head -1)
          echo "Found IPA: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          ls -lh "$IPA_PATH"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Écrit la clé .p8 (App Store Connect API) dans un fichier
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Upload via altool (lit la clé dans ~/private_keys automatiquement)
          xcrun altool --upload-app \
            -f "${{ steps.ipa.outputs.ipa_path }}" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain-db || true
          rm -f ~/private_keys/*.p8 || true
