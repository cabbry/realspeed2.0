name: Build and Upload to TestFlight

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:  # Permet de lancer manuellement depuis l'UI GitHub

jobs:
  build:
    runs-on: macos-15  # macOS Sequoia avec Xcode 26 disponible
    timeout-minutes: 60

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      PROJECT_PATH: RealSpeed2/RealSpeed2.csproj
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net10.0-ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 with full SDK set
        run: |
          # Lists Xcode installations and checks which one has a full SDK set (iOS + macOS)
          # The .0/.1/.2 suffixed variants on macos-15 runners are sometimes missing the
          # macOS SDK that Microsoft.iOS workload needs for actool. Prefer non-suffixed variants.
          echo "== Xcodes available =="
          ls /Applications/ | grep -i Xcode

          # Candidates: prefer Xcode_26.3.app (sans .0), puis 26.2, 26.1, 26.0, puis variantes .0
          CANDIDATES="Xcode_26.3.app Xcode_26.2.app Xcode_26.1.app Xcode_26.0.app Xcode_26.3.0.app Xcode_26.2.0.app Xcode_26.1.1.app Xcode_26.0.1.app"

          PICKED=""
          for candidate in $CANDIDATES; do
            path="/Applications/$candidate"
            if [ -d "$path" ]; then
              sdks_dir="$path/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"
              echo "Checking $candidate -> $sdks_dir"
              if [ -d "$sdks_dir" ] && ls "$sdks_dir" | grep -q "MacOSX"; then
                echo "  ✓ Has macOS SDK(s): $(ls $sdks_dir | tr '\n' ' ')"
                PICKED="$path"
                break
              else
                echo "  ✗ Missing macOS SDK"
              fi
            fi
          done

          if [ -z "$PICKED" ]; then
            echo "::error::No Xcode 26 with macOS SDK found"
            exit 1
          fi

          echo "Selected Xcode: $PICKED"
          sudo xcode-select -s "$PICKED/Contents/Developer"
          xcodebuild -version
          echo "== iOS SDKs in selected Xcode =="
          ls $PICKED/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/ || true
          xcrun --find actool

      - name: Inspect preinstalled .NET and workloads
        run: |
          echo "== Available dotnet SDKs =="
          dotnet --list-sdks
          echo "== Currently installed workloads =="
          dotnet workload list || true
          echo "== Dotnet version selected =="
          dotnet --version

      - name: Install MAUI workload pinned to Xcode 26.3
        run: |
          # The .NET iOS workload version must match Xcode major.minor exactly:
          #   workload 10.0.100 -> iOS 26.0 SDK -> requires Xcode 26.0
          #   workload 10.0.103 -> iOS 26.1 SDK -> requires Xcode 26.1
          #   workload 10.0.203 -> iOS 26.3 SDK -> requires Xcode 26.3
          #   workload 10.0.300 -> iOS 26.5 SDK -> requires Xcode 26.5
          # We target Xcode 26.3 (latest on macos-15 runner), so use 10.0.203.
          dotnet workload install maui --version 10.0.203
          dotnet workload list

      - name: Import Apple Distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Crée un keychain temporaire dédié au CI
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Décode le .p12 depuis le secret base64
          echo "$CERT_P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12

          # Importe le certificat + clé privée dans le keychain
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Autorise codesign à utiliser la clé sans prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Active le keychain pour la session
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN_PATH"

          # Vérifie
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/profile.mobileprovision

          # Extrait l'UUID pour nommer le fichier
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision)")
          echo "Profile UUID: $UUID"

          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Compute build number
        id: build_number
        run: |
          # CFBundleVersion = build number. Must be monotonically increasing within a
          # given CFBundleShortVersionString. We use GITHUB_RUN_NUMBER (which only ever
          # goes up) + 100 offset to stay safely above any manually-set previous build.
          BUILD_NUMBER=$((100 + GITHUB_RUN_NUMBER))
          echo "Build number: $BUILD_NUMBER (GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER)"
          echo "value=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Build & archive IPA (Release)
        run: |
          dotnet publish $PROJECT_PATH \
            -f $TARGET_FRAMEWORK \
            -c $CONFIGURATION \
            /p:ArchiveOnBuild=true \
            /p:BuildIpa=true \
            /p:ApplicationVersion=${{ steps.build_number.outputs.value }}

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find . -name "*.ipa" -path "*/publish/*" | head -1)
          echo "Found IPA: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          ls -lh "$IPA_PATH"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Écrit la clé .p8 (App Store Connect API) dans un fichier
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Upload via altool (lit la clé dans ~/private_keys automatiquement)
          xcrun altool --upload-app \
            -f "${{ steps.ipa.outputs.ipa_path }}" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain-db || true
          rm -f ~/private_keys/*.p8 || true
